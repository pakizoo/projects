<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    input {   border: 1px solid #cccccc9a;
      width: 100%;
      padding: 8px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    input:hover{
                background-color: rgb(233, 226, 226);
            }
        button {
            background-color: rgb(214, 208, 208);
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;color: black;transition: all 0.3s ease-in;
        }
    

    button:hover {
        background-color: rgb(190, 182, 182);color: black;
    }

   
    
    H4{
        text-decoration: underline;color:black;
    }
  </style>
</head>
<body>

  <form id="registrationForm">
    <h4>Registration<br>Form</h4>
    <label for="full name">Full name:</label>
    <input type="text" id="fullname" name="username" required>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <label for="number">Contact No:</label>
    <input type="number" id="number" name="number" required>
    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword" name="confirmPassword" required>
    <button type="button" id="button"  onclick="validateForm()">Register</button>
  </form>
  <script> 
   document.getElementById("button");
    button.onclick=function(){
     if(fullname.value!=""&&email.value!=""&&username.value!=""&&number.value!=""&&confirmPassword.value!="")
    alert('you have registered your form');
    else
      alert("please fill all fields");
        }
        </script>
</body>
</html>

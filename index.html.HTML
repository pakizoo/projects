<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;transition: all 0.3s ease-in;
    }
input:hover{
    background-color: rgba(236, 226, 226, 0.877);
}
    h2{
       font-size: large;
    }
    button {
      background-color: rgb(94, 94, 228);
      color: #fff;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;transition: all 0.3s ease-in;
    }
    button:hover {
      background-color: rgb(69, 69, 243);
    }
    .para{
            color: blue;margin-left: 1px;text-decoration: underline;
            cursor: pointer;
            margin-right: 170px;margin-bottom: 10px;
        }
  </style>
</head>
<body>
<div class="login-container">
  <h2>Login Page</h2>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
    </div>
    <p class="para">Forgot password?</p>
    <button type="button" onclick="validateLogin()">Login</button>
  </form>
</div>
<script>


</script> 
</body>
</html>
